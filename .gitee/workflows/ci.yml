name: CI - C++ Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  cpp-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang

      # 注意：完整鸿蒙 NDK 编译只能在装有 OHOS_NDK 的 runner 跑（自托管或本地）
      # CI 这步只做 host 平台 syntax / link 校验，验证桥接 C++ 代码本身没编译错
      - name: Configure (host check)
        run: |
          cmake -S . -B build-ci -DOHOS_BUILD=OFF -G Ninja || true

      - name: Build (host syntax check)
        run: |
          if [ -f build-ci/build.ninja ]; then
            cmake --build build-ci -j 2>&1 | tee build.log || true
          fi

      - name: Lint headers
        run: |
          find include src -name '*.h' -o -name '*.cpp' | head -20

  arkts-stub-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify ArkTS stub files
        run: |
          test -d stubs || (echo "stubs/ missing"; exit 1)
          echo "stubs ok"
